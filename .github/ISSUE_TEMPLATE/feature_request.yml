name: 功能建议
description: 提出新功能或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出建议！请尽量描述清楚需求和使用场景。

  - type: textarea
    id: requirement
    attributes:
      label: 需求描述
      description: 你想要什么功能？解决什么问题？
      placeholder: "希望支持代理自动轮换，避免单节点被风控..."
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 在什么情况下会用到这个功能？
      placeholder: "批量注册时，单节点注册多次后容易被 xAI 风控..."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: 期望实现方式
      description: 如果有想法，可描述希望怎么实现
      placeholder: "可从 Clash API 拉取节点列表，按注册次数自动切换..."
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: 当前版本
      placeholder: "例如 v1.0.5"
    validations:
      required: false
